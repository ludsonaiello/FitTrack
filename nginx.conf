server {
    listen 80;
    server_name _;

    # Static assets: try the runtime uploads volume first (admin-uploaded files),
    # then fall back to the built-in assets copied from client/public at build time.
    location /images/ {
        alias /var/www/public/images/;
        try_files $uri @static;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /videos/ {
        alias /var/www/public/videos/;
        try_files $uri @static;
        access_log off;
    }

    # Fallback: serve from the Nginx html root (client/dist built into the image)
    location @static {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # Proxy all API traffic to Fastify
    location /api/ {
        proxy_pass         http://server:4203;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # SPA — everything else falls through to index.html
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
