version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: npx prisma migrate deploy
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - internal
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
      PORT: ${PORT:-4203}
      NODE_ENV: production
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      # Uploaded files land here; the web container serves this volume as static assets
      PUBLIC_DIR: /app/public
    volumes:
      - public_assets:/app/public
    networks:
      - internal

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${CLIENT_URL}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "127.0.0.1:${WEB_PORT:-80}:80"
    volumes:
      # Same volume — Nginx serves /images/ and /videos/ from it directly
      - public_assets:/var/www/public:ro
    networks:
      - internal
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf

configs:
  nginx_conf:
    file: ./nginx.conf

volumes:
  pgdata:
  public_assets:

networks:
  internal:
    driver: bridge
