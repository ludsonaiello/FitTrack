version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Not exposed externally — only reachable by the server container
    networks:
      - internal

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: npx prisma migrate deploy
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - internal
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - db
      - migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
      PORT: ${PORT:-4203}
      NODE_ENV: production
    ports:
      - "127.0.0.1:${PORT:-4203}:${PORT:-4203}"
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
